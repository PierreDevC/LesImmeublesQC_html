<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Les projets — Les Immeubles QC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>

    /* ── Hero ── */
    .p-hero {
      position: relative;
      overflow: hidden;
      height: 560px;
      background: var(--navy);
    }
    @media (max-width: 767px) { .p-hero { height: 380px; } }
    .p-hero-img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 60%;
      display: block;
      opacity: .5;
    }
    .p-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(0,31,91,.6) 0%, rgba(28,56,40,.35) 100%);
    }
    .p-hero-text {
      position: absolute; bottom: 56px; left: 64px; right: 64px;
    }
    @media (max-width: 767px) { .p-hero-text { bottom: 28px; left: 24px; right: 24px; } }
    .p-hero-eyebrow {
      font-size: .75rem; font-weight: 600; letter-spacing: .18em;
      text-transform: uppercase; color: rgba(255,255,255,.7);
      font-family: var(--font); margin-bottom: 12px; display: block;
    }
    .p-hero-title {
      font-family: var(--font); font-weight: 800;
      font-size: clamp(2.25rem, 5vw, 4rem);
      color: white; line-height: 1.1; letter-spacing: -.02em;
    }

    /* ── Intro ── */
    .p-intro {
      background: var(--cream);
      padding: 96px 64px;
    }
    @media (max-width: 1023px) { .p-intro { padding: 72px 32px; } }
    @media (max-width: 767px)  { .p-intro { padding: 56px 20px; } }
    .p-intro-inner {
      max-width: 1280px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr;
      gap: 56px; align-items: center;
    }
    @media (min-width: 1024px) { .p-intro-inner { grid-template-columns: 1fr 1fr; gap: 80px; } }

    .p-eyebrow {
      font-size: .75rem; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: rgba(28,56,40,.5);
      font-family: var(--font); margin-bottom: 16px; display: block;
    }
    .p-title {
      font-family: var(--font); font-weight: 800;
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--forest); line-height: 1.1;
      letter-spacing: -.02em; margin-bottom: 24px;
    }
    .p-body {
      font-size: 1rem; color: rgba(28,56,40,.75);
      line-height: 1.75; margin-bottom: 16px;
    }
    .p-body:last-of-type { margin-bottom: 0; }

    .p-intro-img-wrap {
      border-radius: 24px; overflow: hidden;
      height: 520px;
    }
    @media (max-width: 767px) { .p-intro-img-wrap { height: 280px; } }
    .p-intro-img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── Stats strip ── */
    .p-stats {
      background: var(--navy);
      padding: 64px;
    }
    @media (max-width: 1023px) { .p-stats { padding: 56px 32px; } }
    @media (max-width: 767px)  { .p-stats { padding: 48px 20px; } }
    .p-stats-inner {
      max-width: 1280px; margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
    }
    @media (min-width: 768px) { .p-stats-inner { grid-template-columns: repeat(4, 1fr); } }
    .p-stat-num {
      font-family: var(--font); font-weight: 800;
      font-size: clamp(2.5rem, 5vw, 3.75rem);
      color: white; line-height: 1; letter-spacing: -.02em;
      margin-bottom: 8px;
    }
    .p-stat-label {
      font-size: .875rem; color: rgba(255,255,255,.55);
      line-height: 1.5;
    }

    /* ── Feature rows ── */
    .p-feature {
      background: var(--cream);
      padding: 96px 64px;
    }
    .p-feature.alt { background: #fff; }
    @media (max-width: 1023px) { .p-feature { padding: 72px 32px; } }
    @media (max-width: 767px)  { .p-feature { padding: 56px 20px; } }
    .p-feature-inner {
      max-width: 1280px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr;
      gap: 56px; align-items: center;
    }
    @media (min-width: 1024px) { .p-feature-inner { grid-template-columns: 1fr 1fr; gap: 80px; } }
    .p-feature-inner.reverse { }
    @media (min-width: 1024px) { .p-feature-inner.reverse { direction: rtl; } }
    @media (min-width: 1024px) { .p-feature-inner.reverse > * { direction: ltr; } }

    .p-feature-img-wrap {
      border-radius: 20px; overflow: hidden;
      height: 460px;
    }
    @media (max-width: 767px) { .p-feature-img-wrap { height: 260px; } }
    .p-feature-img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .p-checklist {
      list-style: none;
      display: flex; flex-direction: column; gap: 12px;
      margin-top: 24px;
    }
    .p-checklist li {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: .9375rem; color: rgba(28,56,40,.75); line-height: 1.55;
    }
    .p-checklist li::before {
      content: '';
      display: block;
      width: 18px; height: 18px;
      min-width: 18px;
      border-radius: 50%;
      background: var(--forest);
      margin-top: 2px;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='8' viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
    }

    /* ── CTA banner ── */
    .p-cta {
      background: var(--forest);
      padding: 80px 64px;
      text-align: center;
    }
    @media (max-width: 767px) { .p-cta { padding: 56px 20px; } }
    .p-cta-inner { max-width: 640px; margin: 0 auto; }
    .p-cta-title {
      font-family: var(--font); font-weight: 800;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      color: white; line-height: 1.15;
      letter-spacing: -.02em; margin-bottom: 16px;
    }
    .p-cta-body {
      font-size: .9375rem; color: rgba(255,255,255,.65);
      line-height: 1.7; margin-bottom: 32px;
    }
    .p-cta-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; background: white; color: var(--forest);
      font-size: .875rem; font-weight: 700; border-radius: 12px;
      font-family: var(--font); transition: background .2s, transform .15s;
    }
    .p-cta-btn:hover { background: #f0ebe0; }
    .p-cta-btn:active { transform: scale(.95); }

    /* ── Gallery ── */
    .p-gallery-wrap {
      max-width: 1280px;
      margin: 0 auto;
    }
    .p-gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 32px;
    }
    @media (min-width: 768px) { .p-gallery-grid { grid-template-columns: repeat(3, 1fr); } }
    .p-gallery-item {
      border-radius: 16px;
      overflow: hidden;
      height: 220px;
    }
    @media (min-width: 768px) { .p-gallery-item { height: 260px; } }
    .p-gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main id="primary-content">

  <!-- ── Hero ── -->
  <div class="p-hero">
    <img class="p-hero-img" src="assets/u_o1a2thbk1b-montreal-7294815_1280.webp" alt="Immeuble résidentiel au centre-ville de Montréal" />
    <div class="p-hero-overlay"></div>
    <div class="p-hero-text">
      <span class="p-hero-eyebrow">1935 Rue Tupper · Montréal</span>
      <h1 class="p-hero-title">Les projets :<br>des logements pensés<br>pour la vie étudiante</h1>
    </div>
  </div>

  </main>

  <div id="footer-placeholder"></div>

  <script src="main.js"></script>
</body>
</html>
